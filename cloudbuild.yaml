substitutions:
  _REGION: "asia-northeast3"
  _REPO: "emory-repo"
  _SERVICE: "emory-server"
  _JWT_SECRET: "dGhpcy1pcy1hLXZlcnktdmVyeS1sb25nLWFuZC1zdHJvbmctc2VjcmV0LWtleS0zMitjaGFycyE="
  _MONGO_URI: "mongodb+srv://emory_user:Wjddms416@emory.7vmc0xu.mongodb.net/?retryWrites=true&w=majority&appName=emory"
  _DB_NAME: "emory_db"
  _DB_USER: "root"
  _DB_PASSWORD: "Wjddms416!"
  _DB_CONNECTION_NAME: "emory-2025:asia-northeast3:emory-db"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 0) 디버그: 체크아웃된 내용 확인
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Debug list files'
    entrypoint: bash
    args:
      - -lc
      - |
        pwd
        ls -la
        echo "---- find gradlew ----"
        find . -maxdepth 3 -name gradlew -ls || true

  # 1) gradlew 권한 & CRLF->LF 정리
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Fix line endings & chmod'
    entrypoint: bash
    args:
      - -lc
      - |
        if [ -f ./gradlew ]; then
          sed -i 's/\r$//' ./gradlew || true
          chmod +x ./gradlew
        else
          echo "gradlew not found in $(pwd)"; exit 1
        fi

  # 2) Gradle 빌드 (Wrapper 사용, 테스트 제외)
  - name: 'gradle:8.14.2-jdk21'
    entrypoint: bash
    args:
      - -lc
      - |
        set -eu
        chmod +x ./gradlew || true
        if command -v sed >/dev/null 2>&1; then sed -i 's/\r$//' ./gradlew || true; fi
        ./gradlew --version
        java -version || true
        ./gradlew clean build -x test --no-daemon --stacktrace --info

  # 2.5) bootJar 존재 확인 (없으면 즉시 실패)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Verify bootJar exists'
    entrypoint: bash
    args:
      - -lc
      - |
        ls -l build/libs || true
        c=$(ls build/libs/*.jar 2>/dev/null | wc -l | tr -d ' ')
        if [ "$c" = "0" ]; then
          echo "❌ No JAR under build/libs. Gradle build failed or artifact name mismatch."
          exit 1
        fi

  # 3) Docker 빌드 (최신 jar 1개를 --build-arg로 지정 / 캐시 무효화로 확실히 반영)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Docker Build'
    entrypoint: bash
    args:
      - -lc
      - |
        set -eu
        JAR_FILE=$(ls -1t build/libs/*.jar | head -n1)
        echo "Using JAR_FILE=$JAR_FILE"
        docker build --no-cache \
          --build-arg JAR_FILE="$JAR_FILE" \
          -t asia-northeast3-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA \
          .

  # 4) Docker Push
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Docker Push'
    args:
      - push
      - asia-northeast3-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA

  # 5) Cloud Run 배포 (원인분리용 타임아웃/메모리 여유, no-traffic)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Cloud Run Deploy'
    entrypoint: gcloud
    args:
      [
        'run','deploy','$_SERVICE',
        '--image=asia-northeast3-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA',
        '--region','$_REGION',
        '--platform','managed',
        '--allow-unauthenticated',
        '--cpu','1',
        '--timeout','600',
        '--memory','1Gi',
        '--cpu-boost',
        '--no-traffic',
        '--set-env-vars','SPRING_PROFILES_ACTIVE=prod,SPRING_DATA_MONGODB_URI=$_MONGO_URI,JWT_SECRET=$_JWT_SECRET,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,DB_PASSWORD=$_DB_PASSWORD,DB_CONNECTION_NAME=$_DB_CONNECTION_NAME'
      ]

  # 6) 트래픽 전환 (LATEST로 100% 할당)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Traffic Switch'
    entrypoint: gcloud
    args:
      [
        'run','services','update-traffic','$_SERVICE',
        '--to-latest',
        '--region','$_REGION','--platform','managed'
      ]

images:
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
