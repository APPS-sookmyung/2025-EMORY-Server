steps:
  # 0) 디버그: 무엇이 체크아웃되었는지 확인
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Debug list files'
    entrypoint: bash
    args:
      - -lc
      - |
        pwd
        ls -la
        echo "---- find gradlew ----"
        find . -maxdepth 3 -name gradlew -ls || true

  # 1) CRLF -> LF, 실행권한 부여
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Fix line endings & chmod'
    entrypoint: bash
    args:
      - -lc
      - |
        if [ -f ./gradlew ]; then
          # 줄바꿈 정리(있으면 적용, 없어도 통과)
          sed -i 's/\r$//' ./gradlew || true
          chmod +x ./gradlew
        else
          echo "gradlew not found in $(pwd)"
          exit 1
        fi

  # 2) Gradle Wrapper로 빌드
  - name: 'gcr.io/cloud-builders/gradle'
    id: 'Gradle Build'
    entrypoint: bash
    args:
      - -lc
      - |
        ./gradlew clean build -x test

  # (후속: 도커 빌드/푸시/배포 단계들...)
